<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Produits — Kicksoft Admin</title>
  <link rel="shortcut icon" type="image/png" href="../assets/images/logos/favicon.png" />
  <link rel="stylesheet" href="../assets/css/styles.min.css" />
</head>

<body>
  <div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" data-sidebartype="full"
    data-sidebar-position="fixed" data-header-position="fixed">
    <aside class="left-sidebar">
      <div>
        <div class="brand-logo d-flex align-items-center justify-content-between">
          <a href="./index.html" class="text-nowrap logo-img">
            <img src="../assets/images/logos/dark-logo.svg" width="180" alt="" />
          </a>
          <div class="close-btn d-xl-none d-block sidebartoggler cursor-pointer" id="sidebarCollapse">
            <i class="ti ti-x fs-8"></i>
          </div>
        </div>
        <nav class="sidebar-nav scroll-sidebar" data-simplebar="">
          <ul id="sidebarnav">
            <li class="nav-small-cap">
              <i class="ti ti-dots nav-small-cap-icon fs-4"></i>
              <span class="hide-menu">Home</span>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="./index.html" aria-expanded="false">
                <span><i class="ti ti-layout-dashboard"></i></span>
                <span class="hide-menu">Dashboard</span>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </aside>

    <div class="body-wrapper">
      <header class="app-header">
        <nav class="navbar navbar-expand-lg navbar-light">
          <ul class="navbar-nav">
            <li class="nav-item d-block d-xl-none">
              <a class="nav-link sidebartoggler nav-icon-hover" id="headerCollapse" href="javascript:void(0)">
                <i class="ti ti-menu-2"></i>
              </a>
            </li>
          </ul>
          <div class="navbar-collapse justify-content-end px-0" id="navbarNav">
            <ul class="navbar-nav flex-row ms-auto align-items-center justify-content-end">
              <a href="https://adminmart.com/product/modernize-free-bootstrap-admin-dashboard/" target="_blank" class="btn btn-primary">Download Free</a>
            </ul>
          </div>
        </nav>
      </header>

      <div class="container-fluid">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <div>
            <h5 class="fw-semibold mb-1">Gestion des produits</h5>
            <p class="mb-0 text-muted">Données synchronisées avec Supabase · <span id="db-status" class="badge bg-secondary">…</span></p>
          </div>
          <button type="button" class="btn btn-primary" id="btn-add-product">
            <i class="ti ti-plus me-1"></i> Ajouter un produit
          </button>
        </div>

        <div id="products-alert" class="alert d-none" role="alert"></div>

        <div class="card">
          <div class="card-body">
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th>Image</th>
                    <th>Nom</th>
                    <th>Prix</th>
                    <th>Stock</th>
                    <th>Catégorie</th>
                    <th class="text-end">Actions</th>
                  </tr>
                </thead>
                <tbody id="products-table-body">
                  <tr><td colspan="6" class="text-center text-muted">Chargement…</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <form id="product-form">
          <div class="modal-header">
            <h5 class="modal-title fw-semibold" id="productModalLabel">Nouveau produit</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="product-id" />
            <div class="row g-3">
              <div class="col-md-8">
                <label class="form-label" for="product-name">Nom</label>
                <input type="text" class="form-control" id="product-name" required />
              </div>
              <div class="col-md-4">
                <label class="form-label" for="product-category">Catégorie</label>
                <input type="text" class="form-control" id="product-category" placeholder="Smartphones" />
              </div>
              <div class="col-md-4">
                <label class="form-label" for="product-price">Prix</label>
                <input type="number" step="0.01" min="0" class="form-control" id="product-price" required />
              </div>
              <div class="col-md-4">
                <label class="form-label" for="product-compare">Prix barré (optionnel)</label>
                <input type="number" step="0.01" min="0" class="form-control" id="product-compare" />
              </div>
              <div class="col-md-4">
                <label class="form-label" for="product-stock">Stock</label>
                <input type="number" min="0" class="form-control" id="product-stock" value="0" />
              </div>
              <div class="col-12">
                <label class="form-label" for="product-image">URL image</label>
                <input type="url" class="form-control" id="product-image" placeholder="https://..." />
              </div>
              <div class="col-12">
                <label class="form-label" for="product-description">Description</label>
                <textarea class="form-control" id="product-description" rows="3"></textarea>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Annuler</button>
            <button type="submit" class="btn btn-primary">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../assets/libs/jquery/dist/jquery.min.js"></script>
  <script src="../assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/sidebarmenu.js"></script>
  <script src="../assets/js/app.min.js"></script>
  <script src="../assets/libs/simplebar/dist/simplebar.js"></script>
  <script src="../assets/js/kicksoft-nav.js"></script>
  <script src="../assets/js/products-admin.js"></script>
</body>

</html>
